<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eirCRM</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box }
        html, body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#f8fafc; color:#0f172a; overflow:hidden; height:100vh; width:100vw; -webkit-font-smoothing:antialiased; }
        #root { height:100vh; width:100vw }
        #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#f8fafc; color:#475569; font-weight:500; }
        .err { color:#dc2626; padding:20px; font-family:monospace; font-size:12px; white-space:pre-wrap; background:#fef2f2; border:1px solid #fecaca; border-radius:8px; margin:20px; }
    </style>
</head>
<body>

    <div id="root">
        <div id="loading">Loading eirCRM Components...</div>
    </div>

    <script>
        window.addEventListener('error',(e)=>{
            document.getElementById('root').innerHTML='<div class="err">⚠️ Script Error Details:<br>'+(e.error?.stack||e.message)+'</div>';
        });
    </script>

    <script type="text/babel" data-presets="react" data-type="module" src="/src/App.jsx"></script>

</body>
</html>
